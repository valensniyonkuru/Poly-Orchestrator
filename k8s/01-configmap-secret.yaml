apiVersion: v1
kind: ConfigMap
metadata:
  name: shopnow-config
  namespace: shopnow
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DB_HOST:    "postgres-service"
  DB_NAME:    "shopnow"
  DB_USER:    "shopnow"
  BACKEND_URL: "http://backend-service:5001"
# shopnow-secrets (name: shopnow-secrets, key: DB_PASSWORD) is created at
# runtime by the ExternalSecret in 01-external-secret.yaml via ESO.
# Do NOT add a Secret block here.
