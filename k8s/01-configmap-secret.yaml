apiVersion: v1
kind: ConfigMap
metadata:
  name: shopnow-config
  namespace: shopnow
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DB_HOST:    "postgres-service"
  DB_NAME:    "shopnow"
  DB_USER:    "shopnow"
  BACKEND_URL: "http://backend-service:5001"
---
apiVersion: v1
kind: Secret
metadata:
  name: shopnow-secrets
  namespace: shopnow
type: Opaque
stringData:
  DB_PASSWORD: "shopnow123"
  # In production: use AWS Secrets Manager + External Secrets Operator
  # or: kubectl create secret generic shopnow-secrets --from-env-file=.env
