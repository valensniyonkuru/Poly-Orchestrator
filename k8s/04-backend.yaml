apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shopnow
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          # ECR_REGISTRY format: <account-id>.dkr.ecr.<region>.amazonaws.com
          # Set it before applying:
          #   export ECR_REGISTRY=123456789012.dkr.ecr.us-east-1.amazonaws.com
          #   envsubst < k8s/04-backend.yaml | kubectl apply -f -
          # Or let deploy.sh handle it automatically.
          image: ${ECR_REGISTRY}/shopnow-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: shopnow-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopnow-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shopnow
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
# Horizontal Pod Autoscaler — scales backend pods based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: shopnow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
