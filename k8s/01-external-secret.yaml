# External Secrets Operator (ESO) — pulls DB_PASSWORD from AWS Secrets Manager
# and materialises it as a native Kubernetes Secret at runtime.
# No plaintext credentials are stored in this file or in the cluster manifest.
#
# ── Prerequisites ──────────────────────────────────────────────────────────────
# 1. Install ESO into the cluster (one-time, cluster-admin required):
#
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm repo update
#      helm install external-secrets external-secrets/external-secrets \
#        --namespace external-secrets --create-namespace
#
# 2. Store the secret in AWS Secrets Manager:
#
#      aws secretsmanager create-secret \
#        --name shopnow/dev/db-password \
#        --secret-string '{"password":"<your-real-password>"}'
#
# 3. Create an IAM role (shopnow-secrets-role) with this policy and trust
#    relationship to the EKS OIDC provider, then set its ARN below in the
#    ServiceAccount annotation.
#
#    Minimum IAM policy:
#      secretsmanager:GetSecretValue  on  arn:aws:secretsmanager:<region>:<account>:secret:shopnow/dev/*
# ──────────────────────────────────────────────────────────────────────────────

---
# ServiceAccount — pods annotated with this SA assume the IAM role via IRSA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shopnow-sa
  namespace: shopnow
  annotations:
    # Replace ACCOUNT_ID and REGION with your values.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/shopnow-secrets-role

---
# SecretStore — tells ESO how to authenticate to AWS Secrets Manager.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: shopnow
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1          # must match the region where the secret was created
      auth:
        jwt:
          serviceAccountRef:
            name: shopnow-sa

---
# ExternalSecret — declares which remote secret to fetch and what k8s Secret to create.
# ESO reconciles this every `refreshInterval`, so rotation in Secrets Manager is
# picked up automatically without redeploying the application.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shopnow-db-password
  namespace: shopnow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: shopnow-secrets      # the k8s Secret that pods reference via secretKeyRef
    creationPolicy: Owner      # ESO owns the Secret — it is deleted when this resource is deleted
  data:
    - secretKey: DB_PASSWORD   # key inside the k8s Secret
      remoteRef:
        key: shopnow/dev/db-password   # Secrets Manager secret name
        property: password             # JSON field inside the secret value
